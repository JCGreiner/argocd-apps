---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sonarr
  namespace: media
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - sonarr.greiner.home
      secretName: sonarr-tls
  rules:
    - host: sonarr.greiner.home
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: sonarr
                port:
                  number: 8989

apiVersion: apps/v1
kind: Deployment
metadata:
  name: immich-server
  namespace: immich
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: immich-server
  template:
    metadata:
      labels:
        app: immich-server
    spec:
      containers:
        - name: immich
          image: ghcr.io/immich-app/immich-server:commit-09791092dac03bf166e6b8d2e07131bec5f2bbf3
          ports:
            - containerPort: 3001
          env:
            - name: DB_HOSTNAME
              value: immich-postgres
            - name: REDIS_HOSTNAME
              value: immich-redis
            - name: IMMICH_SERVER_URL
              value: https://photos.greiner.home
          volumeMounts:
            - name: pictures
              mountPath: /usr/src/app/upload
      volumes:
        - name: pictures
          persistentVolumeClaim:
            claimName: immich-pictures
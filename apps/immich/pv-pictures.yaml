apiVersion: v1
kind: PersistentVolume
metadata:
  name: immich-pictures-pv
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  capacity:
    storage: 1Gi
  accessModes:
    - ReadOnlyMany
  storageClassName: ""
  persistentVolumeReclaimPolicy: Retain
  hostPath:
    path: /data1/pictures
    type: DirectoryOrCreate
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: immich
  namespace: immich
  annotations:
    cert-manager.io/cluster-issuer: greiner-ca-issuer
spec:
  ingressClassName: traefik   # 👈 THIS is the fix
  tls:
    - hosts:
        - photos.greiner.home
      secretName: immich-tls
  rules:
    - host: photos.greiner.home
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: immich-server
                port:
                  number: 80
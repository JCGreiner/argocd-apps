apiVersion: v1
kind: PersistentVolume
metadata:
  name: prowlarr-config-pv
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  storageClassName: ""
  capacity:
    storage: 5Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  nfs:
    server: 192.168.1.19
    path: /data1/media/prowlarr

apiVersion: v1
kind: PersistentVolume
metadata:
  name: sonarr-config-pv
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  capacity:
    storage: 5Gi
  accessModes:
    - ReadWriteOnce
  storageClassName: ""
  persistentVolumeReclaimPolicy: Retain
  nfs:
    server: 192.168.1.19
    path: /data1/media/sonarr
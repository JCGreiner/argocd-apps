---
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: platform
  namespace: argocd
spec:
  generators:
    - list:
        elements:
          - name: vault
            chart: vault
            repoURL: https://helm.releases.hashicorp.com
            targetRevision: 0.32.0
            namespace: vault

  template:
    metadata:
      name: "{{name}}"
    spec:
      project: default

      source:
        repoURL: "{{repoURL}}"
        chart: "{{chart}}"
        targetRevision: "{{targetRevision}}"
        helm:
          values: |
            server:
              standalone:
                enabled: true

      destination:
        server: https://kubernetes.default.svc
        namespace: "{{namespace}}"

      syncPolicy:
        automated:
          prune: true
          selfHeal: true

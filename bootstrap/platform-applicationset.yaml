---
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: platform
  namespace: argocd
spec:
  generators:
    - list:
        elements:
          - name: vault
            chart: vault
            repoURL: https://helm.releases.hashicorp.com
            targetRevision: 0.32.0
            namespace: vault

          - name: vault-unseal
            chart: vault
            repoURL: https://helm.releases.hashicorp.com
            targetRevision: 0.32.0
            namespace: vault-unseal
  template:
    metadata:
      name: "{{name}}"
    spec:
      project: default

      source:
        repoURL: "{{repoURL}}"
        chart: "{{chart}}"
        targetRevision: "{{targetRevision}}"
        helm:
        values: |
          server:
            standalone:
              enabled: true
            extraEnvironmentVars:
              VAULT_SEAL_TYPE: transit
              VAULT_TRANSIT_ADDR: http://vault-unseal.vault-unseal.svc:8200

      destination:
        server: https://kubernetes.default.svc
        namespace: "{{namespace}}"

      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true

      # 👇 THIS IS THE IMPORTANT FIX
      ignoreDifferences:
        - group: admissionregistration.k8s.io
          kind: MutatingWebhookConfiguration
          jsonPointers:
            - /webhooks

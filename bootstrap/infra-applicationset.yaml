---
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: greiner-infra
  namespace: argocd
spec:
  generators:
    - git:
        repoURL: https://github.com/JCGreiner/argocd-apps.git
        revision: main
        directories:
          - path: infra/*
  template:
    metadata:
      name: 'infra-{{path.basename}}'
    spec:
      project: default
      source:
        repoURL: https://github.com/JCGreiner/argocd-apps.git
        targetRevision: main
        path: '{{path}}'
      destination:
        server: https://kubernetes.default.svc
        namespace: argocd
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
ignoreDifferences:
  - group: ""
    kind: Secret
    jsonPointers:
      - /data
  - group: admissionregistration.k8s.io
    kind: MutatingWebhookConfiguration
    jsonPointers:
      - /webhooks

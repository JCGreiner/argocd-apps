---
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: greiner-apps
  namespace: argocd
spec:
  generators:
    - git:
        repoURL: https://github.com/JCGreiner/argocd-apps.git
        revision: main
        files:
          - path: apps/**/app-config.yaml

  template:
    metadata:
      name: '{{appName}}'

    spec:
      project: default
      source:
        repoURL: https://github.com/JCGreiner/argocd-apps.git
        targetRevision: main
        path: '{{appPath}}'

      destination:
        server: https://kubernetes.default.svc
        namespace: '{{namespace}}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
ignoreDifferences:
  - group: ""
    kind: Secret
    jsonPointers:
      - /data
  - group: admissionregistration.k8s.io
    kind: MutatingWebhookConfiguration
    jsonPointers:
      - /webhooks

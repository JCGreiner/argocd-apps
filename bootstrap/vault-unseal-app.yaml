apiVersion: batch/v1
kind: Job
metadata:
  name: vault-unseal-init
  namespace: vault-unseal
spec:
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: init
          image: hashicorp/vault:1.21.2
          env:
            - name: VAULT_ADDR
              value: http://vault-unseal:8200
          command:
            - /bin/sh
            - -c
            - |
              sleep 20
              vault secrets enable transit || true
              vault write -f transit/keys/autounseal || true
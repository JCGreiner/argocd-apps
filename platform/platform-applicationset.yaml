apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: greiner-platform
  namespace: argocd

spec:
  generators:
    - git:
        repoURL: https://github.com/JCGreiner/argocd-apps.git
        revision: main
        files:
          - path: platform/**/app-config.yaml

  template:
    metadata:
      name: '{{appName}}'

    spec:
      project: default

      source:
        repoURL: https://github.com/JCGreiner/argocd-apps.git
        targetRevision: main
        path: '{{appPath}}'

      destination:
        server: https://kubernetes.default.svc
        namespace: argocd

      syncPolicy:
        automated:
          prune: true
          selfHeal: true